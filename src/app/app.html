<div style="text-align:center; padding:40px; font-family:sans-serif;">
  <h1>Clarity Tarot</h1>

  <button (click)="draw()">Draw a Card</button>

  @if (card) {
    <div style="margin-top:30px;">
      <h2>{{ card.name }}</h2>
      <p>{{ card.reversed ? 'Reversed' : 'Upright' }}</p>
      <p>{{ card.meaning }}</p>
    </div>
  }
</div>
